version: 1

repository:
  name: mind
  description: Personal AI knowledge repository

structure:

  identity:
    description: Stable personal preferences and identity
    priority: low

  knowledge:
    description: Long-term knowledge
    priority: medium

  systems:
    description: Reusable systems and specifications
    priority: high

  projects:
    description: Project-specific documentation
    priority: highest

  state:
    description: Current priorities and active context
    priority: highest

  archive:
    description: Historical information
    priority: ignore_unless_requested

rules:

  single_source_of_truth: true

  markdown_only: true

  duplicate_content: forbidden

  cross_reference: preferred

  canonical_files: required

loading:

  default:
    - state
    - projects
    - systems

  extended:
    - knowledge
    - identity

  full:
    - archive

future:

  context_protocol: planned

  mcp: planned